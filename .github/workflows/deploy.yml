name: Deeploy Backend to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /opt/smartfix/backend
            cd /opt/smartfix/backend
            git pull origin master
            cd /opt/smartfix
            docker compose up -d --build app_smartfixsamana
            docker image prune -f
            echo "✅ Backend deployed!"
            docker compose ps